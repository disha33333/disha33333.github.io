<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Unfinished Notebook</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#fdeef2;
color:#000;
font-family:Georgia,serif;
overflow-x:hidden;
min-height:100vh;
}

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
opacity:.15;

background:
radial-gradient(circle at 15% 20%, #d4af37 0%, transparent 20%),
radial-gradient(circle at 80% 25%, #d4af37 0%, transparent 15%),
radial-gradient(circle at 60% 75%, #d4af37 0%, transparent 20%);
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

.hero h1{
font-size:6rem;
font-weight:normal;
letter-spacing:3px;
margin-bottom:20px;
}

.hero p{
max-width:650px;
line-height:1.8;
font-size:1.1rem;
}

.hero a{
margin-top:50px;
text-decoration:none;
color:black;
border:1px solid black;
padding:12px 28px;
transition:.3s;
}

.hero a:hover{
background:black;
color:white;
}

.cloud{
position:relative;
height:1200px;
max-width:1400px;
margin:auto;
}

.post{
position:absolute;
text-decoration:none;
color:black;
font-size:1.8rem;
padding:10px;
transition:.3s;
}

.post:hover{
transform:scale(1.15);
color:#b48a00;
}

.post:nth-child(1){top:120px;left:10%;}
.post:nth-child(2){top:250px;left:60%;}
.post:nth-child(3){top:420px;left:28%;}
.post:nth-child(4){top:520px;left:78%;}
.post:nth-child(5){top:700px;left:15%;}
.post:nth-child(6){top:850px;left:55%;}
.post:nth-child(7){top:1000px;left:35%;}

.goldcircle{
position:absolute;
border:1px solid rgba(212,175,55,.5);
border-radius:50%;
}

.g1{
width:300px;
height:300px;
top:70px;
left:5%;
}

.g2{
width:220px;
height:220px;
top:500px;
right:10%;
}

.g3{
width:280px;
height:280px;
bottom:80px;
left:35%;
}

footer{
padding:100px 20px;
text-align:center;
font-size:.9rem;
}

</style>
</head>

<body>

<section class="hero">

<h1>Dipshika</h1>

<p>
A quiet corner for books, notes, thoughts,
questions, photographs and unfinished ideas.
</p>

<a href="#garden">enter</a>

</section>

<section id="garden" class="cloud">

<div class="goldcircle g1"></div>
<div class="goldcircle g2"></div>
<div class="goldcircle g3"></div>

<a href="#" class="post">books</a>
<a href="#" class="post">upsc</a>
<a href="#" class="post">photographs</a>
<a href="#" class="post">notes</a>
<a href="#" class="post">essays</a>
<a href="#" class="post">archive</a>
<a href="#" class="post">ideas</a>

</section>

<footer>
made slowly
</footer>

</body>
</html>
